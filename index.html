<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Parser AST - Zoom Interactivo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contenedor-principal">
        <header>
            <div class="header-top">
                <div>
                    <h1>Analizador Sintáctico de Expresiones Aritméticas</h1>
                </div>
                <div class="toggle-tema">
                    <button id="toggleTema" class="btn-toggle-tema" onclick="toggleTema()" title="Cambiar tema">
                        <span class="icono-tema">🌙</span>
                    </button>
                </div>
            </div>
        </header>

        <section class="panel-control">
            <div class="input-grupo">
                <input type="text" id="inputExpresion" placeholder="Ej: 10 / 2 - 3" value="(8-2)-(4-1)">
                <button onclick="ejecutarParser()">Analizar Expresión</button>
            </div>
            
            <div class="info-resultados">
                <div class="caja-info">
                    <span class="etiqueta">ESTADO</span>
                    <span id="estadoValidacion" class="badge">ESPERANDO</span>
                </div>
                <div class="caja-info">
                    <span class="etiqueta">RESULTADO SEMÁNTICO</span>
                    <span id="valorFinal" class="valor-texto">0</span>
                </div>
                <div class="caja-info center">
                    <span class="etiqueta">VISUALIZACIÓN</span>
                    <button id="btnVerArbol" class="btn-secundario" onclick="abrirModal()" disabled>Abrir Árbol Interactivo</button>
                </div>
            </div>
        </section>

        <section class="panel-traza">
            <h3>TRAZA DE DERIVACIÓN (CÁLCULOS INTERMEDIOS)</h3>
            <div id="consolaTraza" class="consola"></div>
        </section>
    </div>

    <div id="modalArbol" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Árbol Sintáctico (AST)</h2>
                <div class="controles-zoom">
                    <button onclick="zoomOut()">➖</button>
                    <button onclick="resetZoom()">100%</button>
                    <button onclick="zoomIn()">➕</button>
                </div>
                <span class="btn-cerrar" onclick="cerrarModal()">&times;</span>
            </div>
            
            <div id="lienzoViewport" class="viewport">
                <div id="contenedorArbol" class="arbol-wrapper">
                    </div>
            </div>
        </div>
    </div>

    <script src="parser.js"></script>
</body>
</html>
